<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kempery World Travel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .error {
            color: #ff6b6b;
            margin-top: 0.5rem;
            font-size: 14px;
        }
        .success {
            color: #51cf66;
            margin-top: 0.5rem;
            font-size: 14px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-bottom: 2rem;">🔐 Login - Kempery World Travel</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Usuario:</label>
                <input type="text" id="email" name="email" placeholder="Ingresa tu usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <button type="submit">Iniciar Sesión</button>
        </form>
        
        <div id="message"></div>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 14px; opacity: 0.8;">
            <p>Credenciales de prueba:</p>
            <p><strong>Admin:</strong> Admin / Kempery2025+</p>
            <p><strong>Paola:</strong> Paola / Kempery2025+</p>
            <p><strong>Cristhian:</strong> Cristhian / Kempery2025+</p>
            <p><strong>Cobranzas:</strong> Cobranzas / Kempery2025+</p>
        </div>
    </div>

    <script>
        // Limpiar datos previos
        localStorage.clear();
        sessionStorage.clear();
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const form = document.getElementById('loginForm');
            
            // Mostrar loading
            form.classList.add('loading');
            messageDiv.innerHTML = '<div class="success">🔄 Iniciando sesión...</div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Guardar token y datos del usuario
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    messageDiv.innerHTML = '<div class="success">✅ ¡Login exitoso! Redirigiendo...</div>';
                    
                    // Redirigir al admin panel simple
                    setTimeout(() => {
                        window.location.href = '/simple-admin.html';
                    }, 1000);
                    
                } else {
                    messageDiv.innerHTML = `<div class="error">❌ ${data.error || 'Error al iniciar sesión'}</div>`;
                }
                
            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = '<div class="error">❌ Error de conexión. Verifica que el backend esté ejecutándose.</div>';
            } finally {
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
